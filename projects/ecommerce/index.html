<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce Product Grid</title>
</head>
<section class="product-section">
  <div class="container">
    <div class="section-header">
      <h2>Featured Products</h2>
      <p>Discover our best-selling items</p>
    </div>

    <div class="product-grid">
      <div class="product-card">
        <span class="badge">Sale</span>
        <img src="D:\Nadeem Akhtar\Nadeem Akhtar\Portfolio\New folder\portfolio_theme_files\images\premium.jpg" alt="Product 1">
        <h3>Classic Sneakers</h3>
        <p class="price"><span class="new-price">$49</span> <span class="old-price">$69</span></p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="D:\Nadeem Akhtar\Nadeem Akhtar\Portfolio\New folder\portfolio_theme_files\images\unsplash.jpg" alt="Product 2">
        <h3>Leather Handbag</h3>
        <p class="price"><span class="new-price">$85</span></p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <span class="badge">New</span>
        <img src="D:\Nadeem Akhtar\Nadeem Akhtar\Portfolio\New folder\portfolio_theme_files\images\rachit.jpg" alt="Product 3">
        <h3>Smart Watch</h3>
        <p class="price"><span class="new-price">$120</span> <span class="old-price">$150</span></p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="D:\Nadeem Akhtar\Nadeem Akhtar\Portfolio\New folder\portfolio_theme_files\images\ryan.jpg" alt="Product 4">
        <h3>Wireless Headphones</h3>
        <p class="price"><span class="new-price">$75</span></p>
        <button>Add to Cart</button>
      </div>
    </div>
  </div>
</section>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
  }

  body {
    background: #f8f8f8;
  }

  .product-section {
    padding: 50px 20px;
  }

  .container {
    max-width: 1200px;
    margin: auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 35px;
  }

  .section-header h2 {
    font-size: 32px;
    margin-bottom: 8px;
    color: #222;
  }

  .section-header p {
    color: #666;
    font-size: 16px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
  }

  .product-card {
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.12);
  }

  .product-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .product-card h3 {
    font-size: 18px;
    color: #222;
    margin-bottom: 10px;
  }

  .price {
    margin-bottom: 15px;
    font-size: 17px;
  }

  .new-price {
    color: #000;
    font-weight: bold;
  }

  .old-price {
    color: #888;
    text-decoration: line-through;
    margin-left: 8px;
  }

  .badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: #000;
    color: #fff;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 20px;
  }

  .product-card button {
    background: #000;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .product-card button:hover {
    background: #333;
  }
</style>
